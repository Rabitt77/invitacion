<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversario ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-family:Arial, sans-serif;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    position:relative;
}

.envelope{
    width:220px;
    height:140px;
    background:#ff4d6d;
    position:relative;
    margin:auto;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-top:70px solid #ff758f;
    transform-origin:top;
    transition:1s;
}

.open .flap{
    transform:rotateX(180deg);
}

.rose{
    font-size:70px;
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%) scale(0);
    transition:1s;
}

.open .rose{
    top:-90px;
    transform:translateX(-50%) scale(1);
}

.message{
    margin-top:30px;
    font-size:20px;
    color:white;
    max-width:340px;
    opacity:0;
    transition:2s;
}

.open + .message{
    opacity:1;
}

img{
    width:220px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.date{
    margin-top:10px;
    color:white;
    font-size:18px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#fff;
    color:#ff4d6d;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope" onclick="openLetter()" id="env">
        <div class="flap"></div>
        <div class="rose">🌹</div>
    </div>

    <div class="message">
        Feliz aniversario amor ❤️<br>
        Te amo no lo imaginas.<br>
        Para mí eres lo más importante del mundo 🌎🌍<br>
        Eres mi vida, tú y mi pequeña estrella de perro ✨🐶<br>
        Soy muy feliz por haberte conocido 💖
        
        <div>
            <img src="IMG20250906182059.jpg" alt="Nuestra foto">
        </div>

        <div class="date" id="fecha"></div>

        <button onclick="window.open('https://youtu.be/450p7goxZqg','_blank')">
            🎵 Nuestra canción
        </button>
    </div>
</div>

<script>
function openLetter(){
    document.getElementById("env").classList.toggle("open");
}

const hoy = new Date();
document.getElementById("fecha").innerHTML =
"📅 " + hoy.toLocaleDateString("es-MX", {
day:"numeric",
month:"long",
year:"numeric"
});
</script>

</body>
</html>
